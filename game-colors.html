<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Գույների խաղ - Brainik</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/game.css">
    <script src="js/i18n.js"></script>
    <script src="js/games-enhanced.js"></script>
</head>
<body class="game-page">
    <div class="game-container">
        <!-- Game Header -->
        <div class="game-header">
            <a href="puzzles.html" class="game-back">← Դուրս գալ</a>
            <div class="game-stats">
                <span class="game-stat">⭐ <span id="stars">0</span></span>
                <span class="game-stat">⏱️ <span id="timer">60</span>վ</span>
                <span class="game-stat">🎯 <span id="score">0</span></span>
            </div>
            <button class="game-help" onclick="showHelp()">❓</button>
        </div>

        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="level-progress" id="levelProgress"></div>
        </div>

        <!-- Game Area -->
        <div class="game-area">
            <div class="game-question">
                <h2 id="questionText">Գտիր ԿԱՐՄԻՐ գույնը!</h2>
            </div>
            
            <div class="color-grid" id="colorGrid">
                <!-- Colors generated by JS -->
            </div>
        </div>

        <!-- Feedback -->
        <div class="feedback" id="feedback"></div>

        <!-- Success Modal -->
        <div class="success-modal" id="successModal">
            <div class="success-content">
                <div class="success-animation">🎉</div>
                <h2 class="success-title">Շատ լավ!</h2>
                <p class="success-text">Դու վաստակեցիր <span id="earnedStars">10</span> աստղ</p>
                <div class="success-buttons">
                    <button class="btn btn-primary" onclick="nextLevel()">Հաջորդ մակարդակ</button>
                    <a href="puzzles.html" class="btn btn-secondary">Ավարտել</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Game State
        let currentLevel = 1;
        let stars = 0;
        let score = 0;
        let timeLeft = 60;
        let timer;
        let questionsAnswered = 0;
        const totalQuestions = 5;

        const colors = [
            { name: 'ԿԱՐՄԻՐ', code: '#ff6b6b', class: 'red' },
            { name: 'ԿԱՄՅԱԿ', code: '#4ecdc4', class: 'cyan' },
            { name: 'ԿԱՊՈՒՏ', code: '#4d96ff', class: 'blue' },
            { name: 'ԴԵՂԻՆ', code: '#ffd93d', class: 'yellow' },
            { name: 'ԿԱՆԱՉ', code: '#6bcb77', class: 'green' },
            { name: 'Մանուշակագույն', code: '#a855f7', class: 'purple' }
        ];

        // Initialize game
        function initGame() {
            updateProgress();
            generateQuestion();
            startTimer();
        }

        function generateQuestion() {
            const targetColor = colors[Math.floor(Math.random() * colors.length)];
            const shuffledColors = [...colors].sort(() => Math.random() - 0.5);
            
            document.getElementById('questionText').textContent = `Գտիր ${targetColor.name} գույնը!`;
            document.getElementById('questionText').style.color = targetColor.code;
            
            const grid = document.getElementById('colorGrid');
            grid.innerHTML = '';
            
            shuffledColors.forEach(color => {
                const btn = document.createElement('button');
                btn.className = `color-btn ${color.class}`;
                btn.style.backgroundColor = color.code;
                btn.onclick = () => checkAnswer(color, targetColor);
                grid.appendChild(btn);
            });
        }

        function checkAnswer(selected, target) {
            const feedback = document.getElementById('feedback');
            
            if (selected.name === target.name) {
                // Correct
                stars += 2;
                score += 10;
                questionsAnswered++;
                
                feedback.innerHTML = '✓ Ճիշտ է!';
                feedback.className = 'feedback correct';
                feedback.style.opacity = '1';
                
                createConfetti();
                
                setTimeout(() => {
                    feedback.style.opacity = '0';
                    
                    if (questionsAnswered >= totalQuestions) {
                        showSuccess();
                    } else {
                        updateProgress();
                        generateQuestion();
                    }
                }, 1000);
            } else {
                // Wrong
                feedback.innerHTML = '✕ Փորձիր կրկին';
                feedback.className = 'feedback wrong';
                feedback.style.opacity = '1';
                
                setTimeout(() => {
                    feedback.style.opacity = '0';
                }, 1000);
            }
            
            updateStats();
        }

        function updateStats() {
            document.getElementById('stars').textContent = stars;
            document.getElementById('score').textContent = score;
        }

        function updateProgress() {
            const progress = (questionsAnswered / totalQuestions) * 100;
            document.getElementById('levelProgress').style.width = `${progress}%`;
        }

        function startTimer() {
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    showTimeout();
                }
            }, 1000);
        }

        function showSuccess() {
            clearInterval(timer);
            document.getElementById('earnedStars').textContent = stars;
            document.getElementById('successModal').classList.add('active');
        }

        function showTimeout() {
            alert('Ժամանակը սպառվեց! Փորձիր կրկին։');
            location.reload();
        }

        function nextLevel() {
            currentLevel++;
            questionsAnswered = 0;
            timeLeft = 60;
            document.getElementById('successModal').classList.remove('active');
            updateProgress();
            generateQuestion();
            startTimer();
        }

        function showHelp() {
            alert('Գտիր հարցում նշված գույնը և սեղմիր դրա վրա։ Ճիշտ պատասխանի համար կստանաս 2 աստղ!');
        }

        function createConfetti() {
            for (let i = 0; i < 20; i++) {
                const confetti = document.createElement('div');
                confetti.style.cssText = `
                    position: fixed;
                    width: 10px;
                    height: 10px;
                    background: ${['#ffd93d', '#ff6b6b', '#4ecdc4', '#6bcb77'][Math.floor(Math.random() * 4)]};
                    left: ${Math.random() * 100}vw;
                    top: -10px;
                    border-radius: 50%;
                    animation: confetti-fall 1s ease-out forwards;
                    z-index: 1000;
                `;
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 1000);
            }
        }

        // Add confetti animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes confetti-fall {
                to {
                    transform: translateY(100vh) rotate(360deg);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // Start game
        initGame();
    </script>
</body>
</html>
