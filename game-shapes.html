<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ֆորմաներ - Brainik</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/game.css">
    <script src="js/i18n.js"></script>
    <script src="js/games-enhanced.js"></script>
    <style>
        .shape-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--space-xl);
        }
        
        .target-shape {
            width: 150px;
            height: 150px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 6rem;
            animation: float 3s ease-in-out infinite;
            box-shadow: 0 10px 30px var(--shadow-soft);
        }
        
        .shapes-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-lg);
            max-width: 400px;
        }
        
        .shape-option {
            aspect-ratio: 1;
            background: white;
            border: 3px solid var(--border-light);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        
        .shape-option:hover {
            border-color: var(--primary-purple);
            transform: scale(1.1);
            box-shadow: 0 8px 25px var(--shadow-medium);
        }
        
        .shape-option.correct {
            background: var(--secondary-green);
            border-color: var(--secondary-green);
            animation: pulse 0.5s ease;
        }
        
        .shape-option.wrong {
            background: var(--secondary-red);
            border-color: var(--secondary-red);
            animation: shake 0.5s ease;
        }
        
        .shape-name {
            font-family: 'Fredoka One', cursive;
            font-size: var(--text-2xl);
            color: var(--primary-purple);
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        @media (max-width: 480px) {
            .target-shape {
                width: 120px;
                height: 120px;
                font-size: 4rem;
            }
            
            .shapes-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .shape-option {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body class="game-page">
    <div class="game-container">
        <div class="game-header">
            <a href="puzzles.html" class="game-back">← Դուրս գալ</a>
            <div class="game-stats">
                <span class="game-stat">⭐ <span id="stars">0</span></span>
                <span class="game-stat">🎯 <span id="level">1</span>/10</span>
            </div>
            <button class="game-help" onclick="showHelp()">❓</button>
        </div>

        <div class="progress-container">
            <div class="level-progress" id="levelProgress"></div>
        </div>

        <div class="game-area">
            <div class="game-question">
                <h2>Գտիր նույն <span class="shape-name" id="shapeName">Քառակուսի</span>ը!</h2>
            </div>
            
            <div class="shape-container">
                <div class="target-shape" id="targetShape">⬜</div>
                
                <div class="shapes-grid" id="shapesGrid">
                    <!-- Shapes generated by JS -->
                </div>
            </div>
        </div>

        <div class="feedback" id="feedback"></div>

        <div class="success-modal" id="successModal">
            <div class="success-content">
                <div class="success-animation">🎊</div>
                <h2 class="success-title">Շատ լավ!</h2>
                <p class="success-text">Դու ճանաչեցիր բոլոր ֆորմաները!</p>
                <div class="success-buttons">
                    <button class="btn btn-primary" onclick="restartGame()">Խաղալ կրկին</button>
                    <a href="puzzles.html" class="btn btn-secondary">Ավարտել</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const shapes = [
            { emoji: '⬜', name: 'Քառակուսի' },
            { emoji: '⭕', name: 'Շրջան' },
            { emoji: '🔺', name: 'Եռանկյուն' },
            { emoji: '🔷', name: 'Ռոմբ' },
            { emoji: '⬡', name: 'Վեցանկյուն' },
            { emoji: '▭', name: 'Ուղղանկյուն' },
            { emoji: '🔸', name: 'Տrapezoid' },
            { emoji: '⭐', name: 'Աստղ' },
            { emoji: '💚', name: 'Սիրտ' }
        ];

        let currentLevel = 1;
        let stars = 0;
        let targetShape = null;
        const totalLevels = 10;

        function initGame() {
            updateProgress();
            generateLevel();
        }

        function generateLevel() {
            // Select random target shape
            targetShape = shapes[Math.floor(Math.random() * shapes.length)];
            
            document.getElementById('targetShape').textContent = targetShape.emoji;
            document.getElementById('shapeName').textContent = targetShape.name;
            
            // Create options (6 shapes including target)
            const options = [targetShape];
            const availableShapes = shapes.filter(s => s.name !== targetShape.name);
            
            while (options.length < 6) {
                const random = availableShapes[Math.floor(Math.random() * availableShapes.length)];
                if (!options.includes(random)) {
                    options.push(random);
                }
            }
            
            // Shuffle
            const shuffledOptions = options.sort(() => Math.random() - 0.5);
            
            // Render
            const grid = document.getElementById('shapesGrid');
            grid.innerHTML = '';
            
            shuffledOptions.forEach(shape => {
                const btn = document.createElement('button');
                btn.className = 'shape-option';
                btn.textContent = shape.emoji;
                btn.onclick = () => checkAnswer(btn, shape);
                grid.appendChild(btn);
            });
        }

        function checkAnswer(btn, selected) {
            const feedback = document.getElementById('feedback');
            
            if (selected.name === targetShape.name) {
                // Correct
                btn.classList.add('correct');
                stars += 2;
                currentLevel++;
                
                document.getElementById('stars').textContent = stars;
                document.getElementById('level').textContent = Math.min(currentLevel, totalLevels);
                
                feedback.innerHTML = '✓ Ճիշտ է!';
                feedback.className = 'feedback correct';
                feedback.style.opacity = '1';
                
                createConfetti();
                
                setTimeout(() => {
                    feedback.style.opacity = '0';
                    
                    if (currentLevel > totalLevels) {
                        document.getElementById('successModal').classList.add('active');
                    } else {
                        updateProgress();
                        generateLevel();
                    }
                }, 1000);
            } else {
                // Wrong
                btn.classList.add('wrong');
                feedback.innerHTML = '✕ Սա ' + selected.name + ' է';
                feedback.className = 'feedback wrong';
                feedback.style.opacity = '1';
                
                setTimeout(() => {
                    btn.classList.remove('wrong');
                    feedback.style.opacity = '0';
                }, 1000);
            }
        }

        function updateProgress() {
            const progress = ((currentLevel - 1) / totalLevels) * 100;
            document.getElementById('levelProgress').style.width = `${progress}%`;
        }

        function restartGame() {
            currentLevel = 1;
            stars = 0;
            document.getElementById('stars').textContent = stars;
            document.getElementById('level').textContent = currentLevel;
            document.getElementById('successModal').classList.remove('active');
            updateProgress();
            generateLevel();
        }

        function showHelp() {
            alert('Դիտիր վերևի ֆորման և գտիր նույնը տակի քարտերից։ Ճիշտ պատասխանի համար կստանաս 2 աստղ!');
        }

        function createConfetti() {
            for (let i = 0; i < 20; i++) {
                const confetti = document.createElement('div');
                confetti.style.cssText = `
                    position: fixed;
                    width: 10px;
                    height: 10px;
                    background: ${['#ffd93d', '#ff6b6b', '#4ecdc4', '#6bcb77'][Math.floor(Math.random() * 4)]};
                    left: ${Math.random() * 100}vw;
                    top: -10px;
                    border-radius: 50%;
                    animation: confetti-fall 1s ease-out forwards;
                    z-index: 1000;
                `;
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 1000);
            }
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes confetti-fall {
                to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        initGame();
    </script>
</body>
</html>
