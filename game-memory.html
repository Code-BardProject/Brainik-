<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Հիշողություն - Brainik</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/game.css">
</head>
<body class="game-page">
    <div class="game-container">
        <div class="game-header">
            <a href="puzzles.html" class="game-back">← Դուրս գալ</a>
            <div class="game-stats">
                <span class="game-stat">⭐ <span id="stars">0</span></span>
                <span class="game-stat">🎯 <span id="moves">0</span> քայլ</span>
                <span class="game-stat">⏱️ <span id="time">0</span>վ</span>
            </div>
            <button class="game-help" onclick="showHelp()">❓</button>
        </div>

        <div class="game-area">
            <div class="game-question">
                <h2>Գտիր զույգերը!</h2>
                <p>Սեղմիր քարտերի վրա՝ բացելու համար</p>
            </div>
            
            <div class="memory-grid" id="memoryGrid">
                <!-- Cards generated by JS -->
            </div>
        </div>

        <div class="success-modal" id="successModal">
            <div class="success-content">
                <div class="success-animation">🏆</div>
                <h2 class="success-title">Շնորհավորում ենք!</h2>
                <p class="success-text">Դու գտար բոլոր զույգերը!</p>
                <div class="success-stats">
                    <p>⭐ Վաստակած աստղեր: <span id="finalStars">0</span></p>
                    <p>🎯 Քայլեր: <span id="finalMoves">0</span></p>
                    <p>⏱️ Ժամանակ: <span id="finalTime">0</span>վ</p>
                </div>
                <div class="success-buttons">
                    <button class="btn btn-primary" onclick="restartGame()">Խաղալ կրկին</button>
                    <a href="puzzles.html" class="btn btn-secondary">Ավարտել</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const emojis = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁', '🐮'];
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let stars = 0;
        let seconds = 0;
        let timer;
        let gridSize = 12;

        function initGame() {
            createGrid();
            startTimer();
        }

        function createGrid() {
            const gameEmojis = emojis.slice(0, gridSize / 2);
            cards = [...gameEmojis, ...gameEmojis].sort(() => Math.random() - 0.5);
            
            const grid = document.getElementById('memoryGrid');
            grid.innerHTML = '';
            
            cards.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'memory-card';
                card.dataset.index = index;
                card.dataset.emoji = emoji;
                
                card.innerHTML = `
                    <div class="card-front">?</div>
                    <div class="card-back">${emoji}</div>
                `;
                
                card.addEventListener('click', () => flipCard(card));
                grid.appendChild(card);
            });
        }

        function flipCard(card) {
            if (card.classList.contains('flipped') || card.classList.contains('matched') || flippedCards.length >= 2) {
                return;
            }
            
            card.classList.add('flipped');
            flippedCards.push(card);
            
            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            const emoji1 = card1.dataset.emoji;
            const emoji2 = card2.dataset.emoji;
            
            if (emoji1 === emoji2) {
                setTimeout(() => {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    matchedPairs++;
                    stars += 2;
                    document.getElementById('stars').textContent = stars;
                    
                    flippedCards = [];
                    
                    if (matchedPairs === gridSize / 2) {
                        showSuccess();
                    }
                }, 500);
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                }, 1000);
            }
        }

        function startTimer() {
            timer = setInterval(() => {
                seconds++;
                document.getElementById('time').textContent = seconds;
            }, 1000);
        }

        function showSuccess() {
            clearInterval(timer);
            
            // Calculate bonus stars based on moves
            const optimalMoves = gridSize;
            if (moves <= optimalMoves + 2) {
                stars += 10;
            } else if (moves <= optimalMoves + 5) {
                stars += 5;
            }
            
            document.getElementById('finalStars').textContent = stars;
            document.getElementById('finalMoves').textContent = moves;
            document.getElementById('finalTime').textContent = seconds;
            document.getElementById('successModal').classList.add('active');
            
            createConfetti();
        }

        function restartGame() {
            matchedPairs = 0;
            moves = 0;
            stars = 0;
            seconds = 0;
            flippedCards = [];
            
            document.getElementById('stars').textContent = '0';
            document.getElementById('moves').textContent = '0';
            document.getElementById('time').textContent = '0';
            document.getElementById('successModal').classList.remove('active');
            
            clearInterval(timer);
            createGrid();
            startTimer();
        }

        function showHelp() {
            alert('Սեղմիր քարտերի վրա՝ դրանք բացելու համար։ Գտիր երկու նույն էմոջիները՝ դրանք զույգ դարձնելու համար։ Փորձիր օգտագործել հնարավորինս քիչ քայլեր!');
        }

        function createConfetti() {
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.style.cssText = `
                    position: fixed;
                    width: 12px;
                    height: 12px;
                    background: ${['#ffd93d', '#ff6b6b', '#4ecdc4', '#6bcb77', '#a855f7'][Math.floor(Math.random() * 5)]};
                    left: ${Math.random() * 100}vw;
                    top: -10px;
                    border-radius: ${Math.random() > 0.5 ? '50%' : '0'};
                    animation: confetti-fall 2s ease-out forwards;
                    z-index: 1000;
                `;
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 2000);
            }
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes confetti-fall {
                to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        initGame();
    </script>
</body>
</html>
