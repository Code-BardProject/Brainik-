<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Հայկական այբուբեն - Brainik</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/game.css">
    <script src="js/i18n.js"></script>
    <script src="js/games-enhanced.js"></script>
    <style>
        .alphabet-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: var(--space-md);
            max-width: 600px;
        }
        
        .letter-card {
            aspect-ratio: 1;
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-fast);
            border: 3px solid transparent;
            position: relative;
        }
        
        .letter-card:hover {
            transform: scale(1.05);
            border-color: var(--primary-purple);
            box-shadow: 0 8px 25px var(--shadow-medium);
        }
        
        .letter-card.active {
            background: var(--primary-gradient);
            color: white;
            transform: scale(1.1);
        }
        
        .letter-display {
            font-family: 'Fredoka One', cursive;
            font-size: var(--text-3xl);
        }
        
        .letter-name {
            font-size: var(--text-xs);
            margin-top: var(--space-xs);
            opacity: 0.7;
        }
        
        .letter-sound {
            position: absolute;
            top: var(--space-xs);
            right: var(--space-xs);
            width: 24px;
            height: 24px;
            background: var(--primary-purple);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-xs);
        }
        
        .practice-area {
            margin-top: var(--space-2xl);
            padding: var(--space-xl);
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            text-align: center;
        }
        
        .practice-letter {
            font-family: 'Fredoka One', cursive;
            font-size: var(--text-5xl);
            color: var(--primary-purple);
            margin-bottom: var(--space-md);
        }
        
        .practice-options {
            display: flex;
            gap: var(--space-md);
            justify-content: center;
            flex-wrap: wrap;
            margin-top: var(--space-lg);
        }
        
        @media (max-width: 600px) {
            .alphabet-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .letter-display {
                font-size: var(--text-2xl);
            }
        }
    </style>
</head>
<body class="game-page">
    <div class="game-container">
        <div class="game-header">
            <a href="puzzles.html" class="game-back">← Դուրս գալ</a>
            <div class="game-stats">
                <span class="game-stat">⭐ <span id="stars">0</span></span>
                <span class="game-stat">📚 <span id="learned">0</span>/39</span>
            </div>
            <button class="game-help" onclick="showHelp()">❓</button>
        </div>

        <div class="game-area">
            <div class="game-question">
                <h2>Սովորի՛ր հայկական այբուբենը</h2>
                <p>Սեղմիր տառերի վրա՝ դրանք լսելու և սովորելու համար</p>
            </div>
            
            <div class="alphabet-grid" id="alphabetGrid">
                <!-- Letters generated by JS -->
            </div>
            
            <div class="practice-area" id="practiceArea" style="display: none;">
                <p>Ո՞ր տառն է սա?</p>
                <div class="practice-letter" id="practiceLetter">Ա</div>
                <div class="practice-options" id="practiceOptions">
                    <!-- Options generated by JS -->
                </div>
            </div>
        </div>

        <div class="feedback" id="feedback"></div>

        <div class="success-modal" id="successModal">
            <div class="success-content">
                <div class="success-animation">📚</div>
                <h2 class="success-title">Բացի՛ր բոլոր տառերը!</h2>
                <p class="success-text">Շարունակիր սովորել և վաստակել ավելի շատ աստղեր</p>
                <div class="success-buttons">
                    <button class="btn btn-primary" onclick="startPractice()">Ստուգել գիտելիքները</button>
                    <a href="puzzles.html" class="btn btn-secondary">Ավարտել</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const alphabet = [
            { letter: 'Ա', name: 'այբ', sound: 'ա' },
            { letter: 'Բ', name: 'բեն', sound: 'բ' },
            { letter: 'Գ', name: 'գիմ', sound: 'գ' },
            { letter: 'Դ', name: 'դա', sound: 'դ' },
            { letter: 'Ե', name: 'եչ', sound: 'ե' },
            { letter: 'Զ', name: 'զա', sound: 'զ' },
            { letter: 'Է', name: 'է', sound: 'է' },
            { letter: 'Ը', name: 'ըթ', sound: 'ը' },
            { letter: 'Թ', name: 'թո', sound: 'թ' },
            { letter: 'Ժ', name: 'ժե', sound: 'ժ' },
            { letter: 'Ի', name: 'ինի', sound: 'ի' },
            { letter: 'Լ', name: 'լյուն', sound: 'լ' },
            { letter: 'Խ', name: 'խե', sound: 'խ' },
            { letter: 'Ծ', name: 'ծա', sound: 'ծ' },
            { letter: 'Կ', name: 'կեն', sound: 'կ' },
            { letter: 'Հ', name: 'հո', sound: 'հ' },
            { letter: 'Ձ', name: 'ձա', sound: 'ձ' },
            { letter: 'Ղ', name: 'ղատ', sound: 'ղ' },
            { letter: 'Ճ', name: 'ճե', sound: 'ճ' },
            { letter: 'Մ', name: 'մեն', sound: 'մ' },
            { letter: 'Յ', name: 'յի', sound: 'յ' },
            { letter: 'Ն', name: 'նու', sound: 'ն' },
            { letter: 'Շ', name: 'շա', sound: 'շ' },
            { letter: 'Ո', name: 'ո', sound: 'ո' },
            { letter: 'Չ', name: 'չա', sound: 'չ' },
            { letter: 'Պ', name: 'պե', sound: 'պ' },
            { letter: 'Ջ', name: 'ջե', sound: 'ջ' },
            { letter: 'Ռ', name: 'ռա', sound: 'ռ' },
            { letter: 'Ս', name: 'սե', sound: 'ս' },
            { letter: 'Վ', name: 'վև', sound: 'վ' },
            { letter: 'Տ', name: 'տյուն', sound: 'տ' },
            { letter: 'Ր', name: 'րէ', sound: 'ր' },
            { letter: 'Ց', name: 'ցո', sound: 'ց' },
            { letter: 'Ու', name: 'ու', sound: 'ու' },
            { letter: 'Փ', name: 'փյուր', sound: 'փ' },
            { letter: 'Ք', name: 'քե', sound: 'ք' },
            { letter: 'Օ', name: 'օ', sound: 'օ' },
            { letter: 'Ֆ', name: 'ֆե', sound: 'ֆ' }
        ];

        let stars = 0;
        let learnedLetters = new Set();
        let isPracticeMode = false;

        function initGame() {
            renderAlphabet();
        }

        function renderAlphabet() {
            const grid = document.getElementById('alphabetGrid');
            grid.innerHTML = '';
            
            alphabet.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'letter-card';
                card.dataset.index = index;
                
                card.innerHTML = `
                    <span class="letter-sound">🔊</span>
                    <span class="letter-display">${item.letter}</span>
                    <span class="letter-name">${item.name}</span>
                `;
                
                card.addEventListener('click', () => learnLetter(index));
                grid.appendChild(card);
            });
        }

        function learnLetter(index) {
            const item = alphabet[index];
            const cards = document.querySelectorAll('.letter-card');
            
            // Mark as learned
            if (!learnedLetters.has(index)) {
                learnedLetters.add(index);
                cards[index].classList.add('active');
                stars += 1;
                document.getElementById('stars').textContent = stars;
                document.getElementById('learned').textContent = learnedLetters.size;
                
                // Show feedback
                showFeedback(`Ճիշտ է! Սա «${item.name}» է`);
                
                // Check if all learned
                if (learnedLetters.size === alphabet.length) {
                    setTimeout(() => {
                        document.getElementById('successModal').classList.add('active');
                    }, 1000);
                }
            } else {
                showFeedback(`«${item.name}» - ${item.sound}`);
            }
        }

        function startPractice() {
            document.getElementById('successModal').classList.remove('active');
            document.getElementById('alphabetGrid').style.display = 'none';
            document.getElementById('practiceArea').style.display = 'block';
            isPracticeMode = true;
            
            nextPracticeQuestion();
        }

        function nextPracticeQuestion() {
            const randomIndex = Math.floor(Math.random() * alphabet.length);
            const correct = alphabet[randomIndex];
            
            document.getElementById('practiceLetter').textContent = correct.letter;
            document.getElementById('practiceLetter').dataset.correct = correct.name;
            
            // Generate options
            const options = [correct.name];
            while (options.length < 4) {
                const random = alphabet[Math.floor(Math.random() * alphabet.length)].name;
                if (!options.includes(random)) {
                    options.push(random);
                }
            }
            
            const container = document.getElementById('practiceOptions');
            container.innerHTML = '';
            
            options.sort(() => Math.random() - 0.5).forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'btn btn-secondary';
                btn.textContent = option;
                btn.onclick = () => checkPracticeAnswer(option, correct.name);
                container.appendChild(btn);
            });
        }

        function checkPracticeAnswer(selected, correct) {
            if (selected === correct) {
                stars += 2;
                document.getElementById('stars').textContent = stars;
                showFeedback('✓ Ճիշտ է! +2 աստղ', true);
                createConfetti();
                
                setTimeout(nextPracticeQuestion, 1500);
            } else {
                showFeedback('✕ Փորձիր կրկին', false);
            }
        }

        function showFeedback(message, isCorrect) {
            const feedback = document.getElementById('feedback');
            feedback.textContent = message;
            feedback.className = 'feedback ' + (isCorrect !== undefined ? (isCorrect ? 'correct' : 'wrong') : '');
            feedback.style.opacity = '1';
            
            setTimeout(() => {
                feedback.style.opacity = '0';
            }, 2000);
        }

        function showHelp() {
            alert('Սեղմիր տառերի վրա՝ դրանք սովորելու համար։ Երբ բոլոր տառերը սովորես, կարող ես անցնել ստուգման։');
        }

        function createConfetti() {
            for (let i = 0; i < 20; i++) {
                const confetti = document.createElement('div');
                confetti.style.cssText = `
                    position: fixed;
                    width: 10px;
                    height: 10px;
                    background: ${['#ffd93d', '#ff6b6b', '#4ecdc4', '#6bcb77'][Math.floor(Math.random() * 4)]};
                    left: ${Math.random() * 100}vw;
                    top: -10px;
                    border-radius: 50%;
                    animation: confetti-fall 1s ease-out forwards;
                    z-index: 1000;
                `;
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 1000);
            }
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes confetti-fall {
                to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        initGame();
    </script>
</body>
</html>
