<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Մաթեմատիկա - Brainik</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/game.css">
    <script src="js/i18n.js"></script>
    <script src="js/games-enhanced.js"></script>
</head>
<body class="game-page">
    <div class="game-container">
        <div class="game-header">
            <a href="puzzles.html" class="game-back">← Դուրս գալ</a>
            <div class="game-stats">
                <span class="game-stat">⭐ <span id="stars">0</span></span>
                <span class="game-stat">⏱️ <span id="timer">90</span>վ</span>
                <span class="game-stat">🎯 <span id="score">0</span></span>
            </div>
            <button class="game-help" onclick="showHelp()">❓</button>
        </div>

        <div class="progress-container">
            <div class="level-progress" id="levelProgress"></div>
        </div>

        <div class="game-area">
            <div class="math-question" id="mathQuestion">5 + 3 = ?</div>
            
            <div class="answer-options" id="answerOptions">
                <!-- Options generated by JS -->
            </div>
        </div>

        <div class="feedback" id="feedback"></div>

        <div class="success-modal" id="successModal">
            <div class="success-content">
                <div class="success-animation">🎉</div>
                <h2 class="success-title">Գերազանց!</h2>
                <p class="success-text">Դու լուծեցիր բոլոր խնդիրները!</p>
                <p class="success-text">Վաստակեցիր <span id="earnedStars">20</span> աստղ</p>
                <div class="success-buttons">
                    <button class="btn btn-primary" onclick="restartGame()">Խաղալ կրկին</button>
                    <a href="puzzles.html" class="btn btn-secondary">Ավարտել</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentLevel = 1;
        let stars = 0;
        let score = 0;
        let timeLeft = 90;
        let timer;
        let questionsAnswered = 0;
        const totalQuestions = 10;
        let currentAnswer = 0;

        const operations = ['+', '-', '*'];

        function initGame() {
            updateProgress();
            generateQuestion();
            startTimer();
        }

        function generateQuestion() {
            const operation = operations[Math.floor(Math.random() * (currentLevel > 3 ? 3 : 2))];
            let num1, num2;
            
            if (currentLevel <= 3) {
                num1 = Math.floor(Math.random() * 10) + 1;
                num2 = Math.floor(Math.random() * 10) + 1;
            } else if (currentLevel <= 6) {
                num1 = Math.floor(Math.random() * 20) + 5;
                num2 = Math.floor(Math.random() * 15) + 1;
            } else {
                num1 = Math.floor(Math.random() * 50) + 10;
                num2 = Math.floor(Math.random() * 20) + 2;
            }
            
            if (operation === '-') {
                if (num1 < num2) [num1, num2] = [num2, num1];
                currentAnswer = num1 - num2;
            } else if (operation === '*') {
                num1 = Math.floor(Math.random() * 10) + 2;
                num2 = Math.floor(Math.random() * 10) + 2;
                currentAnswer = num1 * num2;
            } else {
                currentAnswer = num1 + num2;
            }
            
            document.getElementById('mathQuestion').textContent = `${num1} ${operation} ${num2} = ?`;
            
            // Generate options
            const options = [currentAnswer];
            while (options.length < 4) {
                const wrong = currentAnswer + Math.floor(Math.random() * 10) - 5;
                if (wrong !== currentAnswer && wrong > 0 && !options.includes(wrong)) {
                    options.push(wrong);
                }
            }
            
            const shuffledOptions = options.sort(() => Math.random() - 0.5);
            
            const optionsContainer = document.getElementById('answerOptions');
            optionsContainer.innerHTML = '';
            
            shuffledOptions.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'btn btn-secondary';
                btn.style.cssText = 'font-size: 1.5rem; padding: 1rem 2rem; margin: 0.5rem; min-width: 80px;';
                btn.textContent = option;
                btn.onclick = () => checkAnswer(option);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selected) {
            const feedback = document.getElementById('feedback');
            
            if (selected === currentAnswer) {
                stars += 2;
                score += 10;
                questionsAnswered++;
                
                feedback.innerHTML = '✓ Ճիշտ է!';
                feedback.className = 'feedback correct';
                feedback.style.opacity = '1';
                
                createConfetti();
                
                setTimeout(() => {
                    feedback.style.opacity = '0';
                    
                    if (questionsAnswered >= totalQuestions) {
                        showSuccess();
                    } else {
                        updateProgress();
                        currentLevel++;
                        generateQuestion();
                    }
                }, 1000);
            } else {
                feedback.innerHTML = '✕ Փորձիր կրկին';
                feedback.className = 'feedback wrong';
                feedback.style.opacity = '1';
                
                setTimeout(() => {
                    feedback.style.opacity = '0';
                }, 1000);
            }
            
            document.getElementById('stars').textContent = stars;
            document.getElementById('score').textContent = score;
        }

        function updateProgress() {
            const progress = (questionsAnswered / totalQuestions) * 100;
            document.getElementById('levelProgress').style.width = `${progress}%`;
        }

        function startTimer() {
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    showTimeout();
                }
            }, 1000);
        }

        function showSuccess() {
            clearInterval(timer);
            document.getElementById('earnedStars').textContent = stars;
            document.getElementById('successModal').classList.add('active');
        }

        function showTimeout() {
            alert(`Ժամանակը սպառվեց! Ճիշտ պատասխաններ: ${questionsAnswered}/${totalQuestions}`);
            location.reload();
        }

        function restartGame() {
            currentLevel = 1;
            stars = 0;
            score = 0;
            timeLeft = 90;
            questionsAnswered = 0;
            document.getElementById('successModal').classList.remove('active');
            document.getElementById('stars').textContent = stars;
            document.getElementById('score').textContent = score;
            updateProgress();
            generateQuestion();
            startTimer();
        }

        function showHelp() {
            alert('Լուծիր մաթեմատիկական խնդիրները և ընտրիր ճիշտ պատասխանը։ Ճիշտ պատասխանի համար կստանաս 2 աստղ!');
        }

        function createConfetti() {
            for (let i = 0; i < 20; i++) {
                const confetti = document.createElement('div');
                confetti.style.cssText = `
                    position: fixed;
                    width: 10px;
                    height: 10px;
                    background: ${['#ffd93d', '#ff6b6b', '#4ecdc4', '#6bcb77'][Math.floor(Math.random() * 4)]};
                    left: ${Math.random() * 100}vw;
                    top: -10px;
                    border-radius: 50%;
                    animation: confetti-fall 1s ease-out forwards;
                    z-index: 1000;
                `;
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 1000);
            }
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes confetti-fall {
                to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        initGame();
    </script>
</body>
</html>
