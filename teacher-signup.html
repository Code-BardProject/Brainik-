<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👨‍🏫 Գրանցում ուսուցիչների համար - Brainik</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .teacher-container {
            width: 100%;
            max-width: 480px;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .teacher-container::-webkit-scrollbar { width: 6px; }
        .teacher-container::-webkit-scrollbar-thumb {
            background: rgba(17, 153, 142, 0.3);
            border-radius: 3px;
        }
        
        .logo-section {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .teacher-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            margin: 0 auto 15px;
            box-shadow: 0 10px 30px rgba(17, 153, 142, 0.4);
        }
        
        .role-badge {
            display: inline-block;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        h1 {
            font-size: 24px;
            color: #333;
            text-align: center;
            margin-bottom: 8px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #333;
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        
        .form-label span { color: #e74c3c; }
        
        .form-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        
        .form-input:focus {
            border-color: #11998e;
            outline: none;
            box-shadow: 0 0 0 3px rgba(17, 153, 142, 0.1);
        }
        
        .password-wrapper {
            position: relative;
        }
        
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            opacity: 0.6;
        }
        
        .verification-section {
            background: linear-gradient(135deg, rgba(17, 153, 142, 0.1), rgba(56, 239, 125, 0.1));
            border: 2px solid rgba(17, 153, 142, 0.3);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .verification-title {
            font-size: 13px;
            font-weight: 700;
            color: #11998e;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .verification-text {
            font-size: 12px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 10px;
        }
        
        .checkbox-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #666;
        }
        
        .checkbox-wrapper input {
            width: 18px;
            height: 18px;
            accent-color: #11998e;
            margin-top: 2px;
        }
        
        .checkbox-wrapper a {
            color: #11998e;
            text-decoration: none;
            font-weight: 600;
        }
        
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(17, 153, 142, 0.4);
        }
        
        .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
            color: #999;
            font-size: 13px;
        }
        
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }
        
        .footer-text {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }
        
        .footer-text a {
            color: #11998e;
            font-weight: 700;
            text-decoration: none;
        }
        
        .other-roles {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }
        
        .other-roles-title {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-bottom: 12px;
        }
        
        .role-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .role-link {
            font-size: 13px;
            color: #11998e;
            text-decoration: none;
            font-weight: 600;
        }
        
        @media (max-width: 480px) {
            .teacher-container {
                padding: 25px 20px;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="teacher-container">
        <div class="logo-section">
            <div class="teacher-icon">👨‍🏫</div>
            <span class="role-badge">Ուսուցիչ</span>
        </div>
        
        <h1>Ստեղծիր հաշիվ</h1>
        <p class="subtitle">Միացիր մեր ուսուցիչների համայնքին</p>
        
        <form id="teacherSignupForm" onsubmit="handleTeacherSignup(event)">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Անուն <span>*</span></label>
                    <input type="text" class="form-input" id="firstName" placeholder="Անուն" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Ազգանուն <span>*</span></label>
                    <input type="text" class="form-input" id="lastName" placeholder="Ազգանուն" required>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">Էլ. փոստ <span>*</span></label>
                <input type="email" class="form-input" id="email" placeholder="example@school.am" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Հեռախոս <span>*</span></label>
                <input type="tel" class="form-input" id="phone" placeholder="+374 XX XX XX XX" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Դպրոց/Ուսումնական հաստատություն <span>*</span></label>
                <input type="text" class="form-input" id="school" placeholder="Ձեր դպրոցի անունը" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Առարկա/Մասնագիտություն <span>*</span></label>
                <input type="text" class="form-input" id="subject" placeholder="Օրինակ՝ Մաթեմատիկա" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Գաղտնաբառ <span>*</span></label>
                <div class="password-wrapper">
                    <input type="password" class="form-input" id="password" placeholder="Անվտանգ գաղտնաբառ" required minlength="8">
                    <button type="button" class="toggle-password" onclick="togglePassword()">👁️</button>
                </div>
            </div>
            
            <div class="verification-section">
                <div class="verification-title">✅ Վերահսկում</div>
                <div class="verification-text">Ձեր դիմումը կստուգվի 24 ժամվա ընթացքում: Դուք կստանաք հաստատման նամակ էլ. փոստով:</div>
            </div>
            
            <label class="checkbox-wrapper">
                <input type="checkbox" id="terms" required>
                <span>Ես համաձայն եմ <a href="#">Օգտագործման պայմաններին</a> և հաստատում եմ, որ ես որակավորված ուսուցիչ եմ</span>
            </label>
            
            <button type="submit" class="btn-submit">✓ Ուղարկել դիմում</button>
        </form>
        
        <div class="divider">կամ</div>
        
        <p class="footer-text">
            Արդեն ունե՞ս հաշիվ <a href="teacher-login.html">Մուտք գործել →</a>
        </p>
        
        <div class="other-roles">
            <div class="other-roles-title">Այլ դերեր</div>
            <div class="role-links">
                <a href="student-signup.html" class="role-link">🎓 Ուսանող</a>
                <a href="parent-signup.html" class="role-link">👨‍👩‍👧 Ծնող</a>
                <a href="admin-signup.html" class="role-link">🛡️ Ադմին</a>
            </div>
        </div>
    </div>
    
    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
        }
        
        function handleTeacherSignup(e) {
            e.preventDefault();
            const formData = {
                role: 'teacher',
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                school: document.getElementById('school').value,
                subject: document.getElementById('subject').value,
                password: document.getElementById('password').value,
                status: 'pending',
                createdAt: new Date().toISOString()
            };
            
            // Save to pending teachers
            const teachers = JSON.parse(localStorage.getItem('brainik_pending_teachers') || '[]');
            teachers.push(formData);
            localStorage.setItem('brainik_pending_teachers', JSON.stringify(teachers));
            
            alert('✅ Ձեր դիմումը ընդունվեց! Մենք կստուգենք ձեր տվյալները և կհաստատենք 24 ժամվա ընթացքում:');
            window.location.href = 'teacher-login.html';
        }
    </script>
</body>
</html>
